<text x="322" y="134" font-size="9" fill="#f8717188" font-family="JetBrains Mono,monospace" style="fill:rgba(248, 113, 113, 0.533);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:JetBrains Mono, monospace;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">8080/tcp CLOSED</text>
<text x="322" y="147" font-size="9" fill="#4ade8066" font-family="JetBrains Mono,monospace" style="fill:rgba(74, 222, 128, 0.4);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:JetBrains Mono, monospace;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">3 open / 1 closed</text>
<text x="322" y="162" font-size="9" fill="#4ade8044" font-family="JetBrains Mono,monospace" style="fill:rgba(74, 222, 128, 0.267);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:JetBrains Mono, monospace;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">Done in 1.24s  threads=100</text>

