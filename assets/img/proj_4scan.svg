<text x="322" y="50" font-size="9" fill="#4ade80" font-family="JetBrains Mono,monospace" style="fill:rgb(74, 222, 128);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:JetBrains Mono, monospace;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">$ python 4scan.py 192.168.1.1</text>
<text x="322" y="65" font-size="9" fill="#4ade8066" font-family="JetBrains Mono,monospace" style="fill:rgba(74, 222, 128, 0.4);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:JetBrains Mono, monospace;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">Scanning 192.168.1.1 ...</text>
