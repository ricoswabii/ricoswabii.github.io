<text x="322" y="95" font-size="9" fill="#4ade80" font-family="JetBrains Mono,monospace" style="fill:rgb(74, 222, 128);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:JetBrains Mono, monospace;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">22/tcp  OPEN   ssh</text>
<text x="322" y="108" font-size="9" fill="#4ade80" font-family="JetBrains Mono,monospace" style="fill:rgb(74, 222, 128);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:JetBrains Mono, monospace;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">80/tcp  OPEN   http</text>
